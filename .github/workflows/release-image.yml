name: Release image

# Builds the production image when a release is tagged and publishes it to
# GitHub Container Registry, so a deployment can pull a versioned image
# instead of building from source. Also dispatchable at a tag ref: the
# Release workflow pushes its tag with the workflow token, which does not
# trigger the push event, so it dispatches this workflow instead.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # The docker/* actions still ship on Node 20, which GitHub forces to
      # Node 24 on 2026-06-16. Opt in early so the build runs clean; remove
      # once those actions default to Node 24.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
