name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, check, unit, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex
          POSTGRES_DB: codex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test:unit -- --run
      - run: npm run build

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://codex:codex@localhost:5432/codex
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex
          POSTGRES_DB: codex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  docker-smoke:
    name: Docker stack boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and start the stack
        run: docker compose -f compose.yaml up -d --build
      - name: App responds
        run: curl --retry 12 --retry-delay 5 --retry-all-errors -fsS -o /dev/null http://localhost:3000/login
      - name: Worker stays up
        # The worker imports from src/lib at runtime; a missing file in the
        # image crash-loops here, which CI's host-spawned e2e never sees.
        run: |
          sleep 10
          state=$(docker inspect -f '{{.State.Status}} restarts={{.RestartCount}}' codex-worker-1)
          echo "worker: $state"
          [ "$state" = "running restarts=0" ]
          docker logs codex-worker-1 2>&1 | grep -q "Worker started"
      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.yaml logs
