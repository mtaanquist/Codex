name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Lint, check, unit, build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex
          POSTGRES_DB: codex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install postgresql-client-18 (backup round-trip test)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -so /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-18
          # The runner image preinstalls an older client; put 18 first.
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run test:unit -- --run
      - run: npm run build

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://codex:codex@localhost:5432/codex
      # Asset uploads against a throwaway MinIO; the bitnami image creates
      # the bucket itself, which plain service containers need.
      ASSET_S3_ENDPOINT: http://localhost:9000
      ASSET_S3_REGION: us-east-1
      ASSET_S3_BUCKET: codex-assets
      ASSET_S3_ACCESS_KEY_ID: codex-minio
      ASSET_S3_SECRET_ACCESS_KEY: codex-minio-secret
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: codex
          POSTGRES_PASSWORD: codex
          POSTGRES_DB: codex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Start MinIO (asset uploads)
        run: |
          docker run -d --name minio --network host \
            -e MINIO_ROOT_USER=codex-minio -e MINIO_ROOT_PASSWORD=codex-minio-secret \
            minio/minio server /data
          for attempt in $(seq 1 30); do
            curl -fsS http://localhost:9000/minio/health/live >/dev/null && break
            sleep 1
          done
          docker run --rm --network host --entrypoint sh minio/mc -c \
            "mc alias set local http://localhost:9000 codex-minio codex-minio-secret && mc mb -p local/codex-assets"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  docker-smoke:
    name: Docker stack boots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and start the stack
        run: docker compose -f compose.yaml up -d --build
      - name: App responds
        run: curl --retry 12 --retry-delay 5 --retry-all-errors -fsS -o /dev/null http://localhost:3000/login
      - name: Worker stays up
        # The worker imports from src/lib at runtime; a missing file in the
        # image crash-loops here, which CI's host-spawned e2e never sees.
        run: |
          sleep 10
          state=$(docker inspect -f '{{.State.Status}} restarts={{.RestartCount}}' codex-worker-1)
          echo "worker: $state"
          [ "$state" = "running restarts=0" ]
          docker logs codex-worker-1 2>&1 | grep -q "Worker started"
      - name: First-admin bootstrap runs in the image
        # seed-admin runs raw under Node in the image, like the worker; a
        # missing-extension import fails only here, never in the host-run tests.
        # The script exits non-zero on any failure, so this step gates on it.
        run: >-
          docker compose -f compose.yaml exec -T -e ADMIN_PASSWORD=ci-bootstrap-pw
          app node scripts/seed-admin.ts ci-admin@example.com "CI Admin"
      - name: Show logs on failure
        if: failure()
        run: docker compose -f compose.yaml logs
