version: 2
updates:
  - package-ecosystem: npm
    directory: /
    # Updates integrate through develop like all other changes.
    target-branch: develop
    schedule:
      interval: weekly
    groups:
      # Keep noise down: one PR per week for routine updates.
      all-dependencies:
        patterns: ['*']
  - package-ecosystem: github-actions
    directory: /
    target-branch: develop
    schedule:
      interval: weekly
