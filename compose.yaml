# The self-host stack: app, worker, and database. Caddy is optional and
# off by default, for instances that sit behind their own reverse proxy;
# enable it with COMPOSE_PROFILES=caddy in .env (or --profile caddy) to
# let this stack terminate TLS instead.
#
# Defaults run out of the box on http://localhost:3000. Every variable is
# documented in .env.example. Editor-hosted development uses
# compose.dev.yaml (database only) instead.
name: codex

services:
  app:
    build: .
    image: codex-app
    restart: unless-stopped
    command: codex-app
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgres://codex:${POSTGRES_PASSWORD:-codex}@db:5432/codex
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      # Trust the reverse proxy's forwarded client address so per-IP rate
      # limits see the real client and not the proxy. XFF_DEPTH is the number
      # of proxies in front of the app (1 for a single Caddy or nginx).
      ADDRESS_HEADER: ${ADDRESS_HEADER:-x-forwarded-for}
      XFF_DEPTH: ${XFF_DEPTH:-1}
      # Image uploads go up to 10 MB; the adapter default is 512 KB.
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-15M}
      # Uploaded images, stored in their own S3-compatible bucket.
      ASSET_S3_ENDPOINT: ${ASSET_S3_ENDPOINT:-}
      ASSET_S3_REGION: ${ASSET_S3_REGION:-}
      ASSET_S3_BUCKET: ${ASSET_S3_BUCKET:-}
      ASSET_S3_PREFIX: ${ASSET_S3_PREFIX:-}
      ASSET_S3_ACCESS_KEY_ID: ${ASSET_S3_ACCESS_KEY_ID:-}
      ASSET_S3_SECRET_ACCESS_KEY: ${ASSET_S3_SECRET_ACCESS_KEY:-}
      # The app only reads these to show backup status on the admin page.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      # Encrypts secrets stored in the database (the SMTP password).
      APP_SECRET: ${APP_SECRET:-}
      # SMTP relay seed; the admin panel can override and store these.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: codex-app
    build: .
    restart: unless-stopped
    command: codex-worker
    environment:
      DATABASE_URL: postgres://codex:${POSTGRES_PASSWORD:-codex}@db:5432/codex
      # Off-site backups; off until the bucket and keys are set.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_CRON: ${BACKUP_CRON:-}
      BACKUP_KEEP_RECENT_HOURS: ${BACKUP_KEEP_RECENT_HOURS:-}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-}
      # The worker sends email, so it needs the relay config and the key to
      # decrypt a stored SMTP password.
      APP_SECRET: ${APP_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codex}
      POSTGRES_DB: codex
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codex']
      interval: 5s
      timeout: 5s
      retries: 10

  # A local S3-compatible bucket for assets (and backups, if pointed at
  # it). Opt in with COMPOSE_PROFILES=minio. This keeps the objects on the
  # same host; for real disaster recovery point ASSET_S3_* and BACKUP_S3_*
  # at an external bucket (S3, B2, R2) instead.
  minio:
    image: minio/minio
    profiles:
      - minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-codex-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-codex-minio-secret}
    volumes:
      - minio-data:/data

  # One-shot: creates the buckets on first start, then exits.
  minio-init:
    image: minio/mc
    profiles:
      - minio
    depends_on:
      - minio
    restart: 'no'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-codex-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-codex-minio-secret}
    entrypoint:
      - sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        do sleep 1; done &&
        mc mb -p local/codex-assets && mc mb -p local/codex-backups

  caddy:
    image: caddy:2-alpine
    profiles:
      - caddy
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  minio-data:
  caddy-data:
  caddy-config:
