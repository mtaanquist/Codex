# The self-host stack: app, worker, and database. Caddy is optional and
# off by default, for instances that sit behind their own reverse proxy;
# enable it with COMPOSE_PROFILES=caddy in .env (or --profile caddy) to
# let this stack terminate TLS instead.
#
# Defaults run out of the box on http://localhost:3000. Every variable is
# documented in .env.example. Editor-hosted development uses
# compose.dev.yaml (database only) instead.
name: codex

services:
  app:
    build: .
    image: codex-app
    restart: unless-stopped
    command: sh -c "node scripts/migrate.ts && node build"
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      DATABASE_URL: postgres://codex:${POSTGRES_PASSWORD:-codex}@db:5432/codex
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      # The app only reads these to show backup status on the admin page.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: codex-app
    build: .
    restart: unless-stopped
    command: node src/worker/index.ts
    environment:
      DATABASE_URL: postgres://codex:${POSTGRES_PASSWORD:-codex}@db:5432/codex
      # Off-site backups; off until the bucket and keys are set.
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_CRON: ${BACKUP_CRON:-}
      BACKUP_KEEP_RECENT_HOURS: ${BACKUP_KEEP_RECENT_HOURS:-}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codex}
      POSTGRES_DB: codex
    volumes:
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codex']
      interval: 5s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    profiles:
      - caddy
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  db-data:
  caddy-data:
  caddy-config:
