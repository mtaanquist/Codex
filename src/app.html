<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Set the theme before first paint to avoid a flash. The toggle in
			// the top bar writes the same localStorage key.
			(function () {
				var theme = 'light';
				function concrete(v, fallback) {
					return v === 'light' || v === 'warm' || v === 'dark' ? v : fallback;
				}
				try {
					var stored = localStorage.getItem('codex-theme');
					if (stored === 'light' || stored === 'warm' || stored === 'dark') {
						theme = stored;
					} else {
						// No stored choice means "follow system": resolve through the
						// saved light/dark mappings.
						var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
						theme = prefersDark
							? concrete(localStorage.getItem('codex-system-dark'), 'dark')
							: concrete(localStorage.getItem('codex-system-light'), 'light');
					}
				} catch (e) {
					/* default stands */
				}
				document.documentElement.setAttribute('data-theme', theme);
				document.documentElement.setAttribute('data-density', 'comfortable');
				try {
					var accent = localStorage.getItem('codex-accent');
					if (accent && /^#(?:[0-9a-f]{3}|[0-9a-f]{6})$/i.test(accent))
						document.documentElement.style.setProperty('--accent', accent);
				} catch (e) {
					/* default accent stands */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
